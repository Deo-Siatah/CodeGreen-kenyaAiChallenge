version: '3.8'

services:
  agroforesight-api:
    build: .
    container_name: agroforesight-api
    
    env_file:
      - .env
    
    volumes:
      - .:/app
      - /app/.venv         # ← Exclude venv from sync
      - /app/.venv/lib     # ← Extra safety
    
    ports:
      - "8000:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
    
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload